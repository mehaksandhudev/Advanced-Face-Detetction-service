services:
  face-detection-service:
    build: .
    container_name: face-detection-service
    ports:
      - "5001:5001"
    volumes:
      # Mount a local folder for passing files via filePath in API requests
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
